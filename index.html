<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeBihin Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    header h1 {
      color: #38bdf8;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }

    .hero h2 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .btn {
      padding: 12px 30px;
      background: #38bdf8;
      border: none;
      border-radius: 30px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <h1>CodeBihin 📚</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Books</a>
    <a href="#">About</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Digital Book Store 🚀</h2>
    <p>High-quality coding & tech books are coming soon!</p>
    <button class="btn">Coming Soon</button>
  </div>
</section>

<footer>
  © 2026 CodeBihin. All rights reserved.
</footer>

</body>
</html>
